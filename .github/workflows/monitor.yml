name: 豆瓣高分监控

on:
  # schedule:
  #   # 北京时间 15:00 = UTC 07:00
  #   - cron: '0 7 * * *'
  #   # 北京时间 03:00 = UTC 19:00
  #   - cron: '0 19 * * *'
  workflow_dispatch: # 仅手动触发（豆瓣 API 拒绝境外 IP，定时运行由国内 Docker 负责）

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 运行监控（轻量模式）
        run: python scripts/monitor.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/ reports/
          if git diff --cached --quiet; then
            echo "没有数据变更，跳过提交"
          else
            git commit -m "chore: 更新监控数据 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push
          fi
